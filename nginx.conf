server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão (texto/CSS/JS/SVG) — imagens e woff2 já são comprimidos
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache longo para assets estáticos (versione trocando o nome do arquivo)
    location ~* \.(?:css|js|woff2|jpe?g|png|webp|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML sempre revalida (para publicar mudanças na hora)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
